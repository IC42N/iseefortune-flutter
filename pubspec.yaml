  drift: ^2.28.0
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5
  path: ^1.9.1
  solana_seed_vault: ^0.2.0+1
  provider: ^6.1.1 
  google_fonts: ^6.3.0
  collection: ^1.19.1
  logger: ^2.6.1
